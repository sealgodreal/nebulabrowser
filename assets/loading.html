<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .wave-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; display: flex; align-items: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 4vw, 3rem); color: #ffffff; white-space: nowrap; letter-spacing: 0.02em; user-select: none; }
  .sub-text { position: fixed; top: calc(50% + 2rem); left: 50%; transform: translateX(-50%); z-index: 1; font-family: 'Nunito', sans-serif; font-weight: 400; font-size: clamp(0.9rem, 1.8vw, 1.1rem); color: rgba(255,255,255,0.6); white-space: nowrap; user-select: none; }
  body { transition: opacity 5s ease; opacity: 1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wave-text">loading iframe...</div>
<div class="sub-text">please be patient</div>
<script>
  const sped = 5;

  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const SHADES = [
    "rgba(255,255,255,",
    "rgba(235,235,235,",
    "rgba(210,210,210,",
    "rgba(185,185,185,",
    "rgba(160,160,160,",
    "rgba(220,220,220,",
  ];

  function spawnParticle() {
    const w = canvas.width, h = canvas.height;
    const edge = Math.random();
    let x, y, vx, vy;
    const baseSpeed = 0.35 + Math.random() * 0.55;
    const speed = baseSpeed * sped;

    if (edge < 0.45) {
      x = Math.random() * w * 0.65;
      y = h * (0.92 + Math.random() * 0.08);
      const angle = -(Math.PI * 0.18 + Math.random() * Math.PI * 0.28);
      vx = speed * Math.cos(angle) * (0.6 + Math.random() * 0.6);
      vy = speed * Math.sin(angle) * (0.8 + Math.random() * 0.5);
    } else if (edge < 0.85) {
      x = w * (Math.random() * 0.05);
      y = h * (0.35 + Math.random() * 0.65);
      const angle = -(Math.PI * 0.08 + Math.random() * Math.PI * 0.3);
      vx = speed * (0.7 + Math.random() * 0.5);
      vy = -speed * (0.3 + Math.random() * 0.5);
    } else {
      x = w * (Math.random() * 0.1);
      y = h * (0.85 + Math.random() * 0.15);
      const angle = -(Math.PI * 0.22 + Math.random() * Math.PI * 0.22);
      vx = speed * Math.cos(angle) * (0.6 + Math.random() * 0.7);
      vy = speed * Math.sin(angle) * (0.7 + Math.random() * 0.5);
    }

    return {
      x, y, vx, vy,
      size: 0.8 + Math.random() * 2.2,
      shade: SHADES[Math.floor(Math.random() * SHADES.length)],
      alpha: 0.25 + Math.random() * 0.5,
      frame: 0,
      wobbleAmp: 0.2 + Math.random() * 0.9,
      wobbleFreq: 0.015 + Math.random() * 0.025,
      wobbleOffset: Math.random() * Math.PI * 2,
      curve: (Math.random() - 0.35) * 0.006,
    };
  }

  function stepParticle(p) {
    p.vx += p.curve;
    p.x += p.vx + Math.sin(p.frame * p.wobbleFreq + p.wobbleOffset) * p.wobbleAmp;
    p.y += p.vy;
    p.frame++;
  }

  function isOffscreen(p) {
    return p.x > canvas.width + 20 || p.y < -20 || p.x < -20 || p.y > canvas.height + 20;
  }

  function drawParticle(p) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.shade + p.alpha.toFixed(3) + ")";
    ctx.fill();
  }

  function seedParticles(count) {
    const w = canvas.width, h = canvas.height;
    const cols = Math.ceil(Math.sqrt(count * (w / h)));
    const rows = Math.ceil(count / cols);
    const cellW = w / cols;
    const cellH = h / rows;
    const result = [];

    for (let row = 0; row < rows && result.length < count; row++) {
      for (let col = 0; col < cols && result.length < count; col++) {
        const targetX = col * cellW + Math.random() * cellW;
        const targetY = row * cellH + Math.random() * cellH;

        let best = null;
        let bestDist = Infinity;
        for (let attempt = 0; attempt < 30; attempt++) {
          const p = spawnParticle();
          const preFrames = Math.floor(10 + Math.random() * 500);
          for (let f = 0; f < preFrames; f++) stepParticle(p);
          if (isOffscreen(p)) continue;
          const dist = Math.hypot(p.x - targetX, p.y - targetY);
          if (dist < bestDist) {
            bestDist = dist;
            best = p;
          }
          if (dist < Math.max(cellW, cellH) * 0.5) break;
        }
        result.push(best || spawnParticle());
      }
    }
    return result;
  }

  const PARTICLE_COUNT = 55;
  const particles = seedParticles(PARTICLE_COUNT);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
      if (isOffscreen(particles[i])) particles[i] = spawnParticle();
      stepParticle(particles[i]);
      drawParticle(particles[i]);
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
</script>
<script>
  const subText = document.querySelector(".sub-text");
  const waveText = document.querySelector(".wave-text");

  const messages = [
    "please be patient",
    "the proxy is still in development, that's why it's so ass",
    "credits to frogiee1 for ideas",
    "fuck off securly",
    "\"michael knows how to be tuff, why can't you\" - luis (ur NOT tuff btw ✌️)",
    "incognito + proton = opsec",
  ];

  let currentIndex = 0;

  subText.textContent = messages[currentIndex];

  const rotatingMessages = messages.slice(1);

  function getRandomIndex(exclude, arrayLength) {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * arrayLength);
    } while (newIndex === exclude);
    return newIndex;
  }

  let lastIndex = -1;

  const cycleInterval = setInterval(() => {
    const newIndex = getRandomIndex(lastIndex, rotatingMessages.length);
    lastIndex = newIndex;
    subText.textContent = rotatingMessages[newIndex];
  }, 5000);

  waveText.style.transition = "opacity 5s ease";
  subText.style.transition = "opacity 5s ease";

  setTimeout(() => {
    clearInterval(cycleInterval);
    subText.textContent = "if you're seeing this, you should refresh the page.";
    waveText.style.opacity = "0";
    subText.style.opacity = "0";
    document.body.style.opacity = "0";
  }, 55000);
</script>
</body>
</html>
