<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #vanta { position: fixed; inset: 0; z-index: 0; }
  .wave-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; display: flex; align-items: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 4vw, 3rem); color: #ffffff; white-space: nowrap; letter-spacing: 0.02em; user-select: none; }
  .wave-char { display: inline-block; will-change: transform; line-height: 1; }
</style>
</head>
<body>
<div id="vanta"></div>
<div class="wave-text" id="waveText"></div>
<script>
  VANTA.FOG({
    el: "#vanta",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200,
    minWidth: 200,
    highlightColor: 0x333333,
    midtoneColor: 0x1a1a1a,
    lowlightColor: 0x0a0a0a,
    baseColor: 0x000000,
    blurFactor: 0.95,
    speed: 1,
    zoom: 0.5
  });
</script>
<script>
  const text = "loading, please wait...";
  const container = document.getElementById("waveText");
  const spans = [];
  for (let i = 0; i < text.length; i++) {
    const span = document.createElement("span");
    span.className = "wave-char";
    span.textContent = text[i] === " " ? "\u00A0" : text[i];
    container.appendChild(span);
    spans.push(span);
  }
  const AMPLITUDE = 6;
  const FREQ = 0.45;
  const PHASE_STEP = 0.38;
  let startTime = null;
  function animate(ts) {
    if (!startTime) startTime = ts;
    const t = (ts - startTime) / 1000;
    for (let i = 0; i < spans.length; i++) {
      const y = Math.sin(t * FREQ * Math.PI * 2 - i * PHASE_STEP) * AMPLITUDE;
      spans[i].style.transform = `translateY(${y.toFixed(3)}px)`;
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
</script>
</body>
</html>
