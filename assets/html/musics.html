<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Nunito', sans-serif;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.app {
  position: fixed;
  inset: 0;
  z-index: 1;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 30px;

  overflow: hidden;
}

.app::-webkit-scrollbar {
  display: none;
}
.app {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.card {
  flex: 0 0 auto;

  width: clamp(340px, 32vw, 520px);
  height: clamp(520px, 75vh, 720px);

  background: rgba(28, 28, 30, 0.78);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  backdrop-filter: blur(18px);

  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.album-art {
  flex-shrink: 0;
  height: 240px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.album-art > svg {
  opacity: 0.18;
  color: #fff;
  width: 64px;
  height: 64px;
}

.visualizer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: 0 12px 10px;
  opacity: 0;
  transition: opacity 0.5s;
}

.visualizer.active {
  opacity: 1;
}

.vis-bar {
  flex: 1;
  border-radius: 5px 5px 0 0;
  background: rgba(255,255,255,0.28);
  height: 4px;
  transform-origin: bottom;
}

.vis-bar.playing {
  animation: vis-dance var(--d, 0.6s) ease-in-out infinite alternate;
}

@keyframes vis-dance {
  from { transform: scaleY(0.15); }
  to { transform: scaleY(1); }
}

.track-info {
  flex-shrink: 0;
  padding: 14px 18px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.track-dots {
  display: flex;
  gap: 3px;
}

.track-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
}

.track-meta {
  flex: 1;
  min-width: 0;
}

.track-title {
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.track-artist {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.progress-wrap {
  flex-shrink: 0;
  padding: 0 18px;
}

.progress-track {
  height: 5px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  cursor: pointer;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.55);
  border-radius: 999px;
  width: 0%;
  transition: width 0.25s linear;
  pointer-events: none;
}

.time-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0 0;
  font-size: 10px;
  color: rgba(255,255,255,0.28);
}

.controls {
  flex-shrink: 0;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.ctrl-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.55);
  padding: 10px;
  border-radius: 14px;
  transition: color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover {
  color: #fff;
  background: rgba(255,255,255,0.08);
}

.play-btn {
  background: rgba(255,255,255,0.9);
  border: none;
  cursor: pointer;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0a0a0a;
  transition: background 0.15s, transform 0.1s;
}

.play-btn:hover {
  background: #fff;
  transform: scale(1.05);
}

.play-btn:active {
  transform: scale(0.97);
}

.bottom-bar {
  flex-shrink: 0;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.bottom-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.32);
  padding: 6px;
  border-radius: 10px;
  transition: color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bottom-btn:hover {
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.06);
}

.bottom-btn.active {
  color: rgba(255,255,255,0.9);
}

.vol-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.vol-wrap svg {
  color: rgba(255,255,255,0.3);
}

.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 70px;
  height: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  outline: none;
  cursor: pointer;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
}

.search-bar {
  flex-shrink: 0;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.search-input {
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-size: 14px;
  flex: 1;
  caret-color: rgba(255,255,255,0.5);
}

.search-input::placeholder {
  color: rgba(255,255,255,0.25);
}

.results-area {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  min-height: 0;
}

.results-area::-webkit-scrollbar {
  width: 4px;
}

.results-area::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.16);
  border-radius: 10px;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: rgba(255,255,255,0.18);
}

.empty-state svg {
  opacity: 0.22;
  width: 34px;
  height: 34px;
}

.empty-state span {
  font-size: 12px;
}

.result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: background 0.12s;
  border-radius: 12px;
  margin: 0 6px;
}

.result-item:hover {
  background: rgba(255,255,255,0.06);
}

.result-item.playing {
  background: rgba(255,255,255,0.08);
}

.result-num {
  font-size: 11px;
  color: rgba(255,255,255,0.22);
  width: 16px;
  text-align: center;
}

.result-title {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
}

.result-artist {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 1px;
}

.music-note {
  padding: 10px 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  text-align: left;
  margin-top: 6px;
  margin-left: 4px;
  pointer-events: none;
}

.dots {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 6px;
  z-index: 2;
}

.dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

@media (max-width: 900px) {
  .dots {
    display: flex;
  }
}

@media (max-width: 900px) {
  .app {
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;

    padding: 0;
    gap: 0;
    justify-content: flex-start;
  }

  .card {
    width: 100vw;
    height: 100vh;
    border-radius: 0;

    scroll-snap-align: center;
  }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="app">

  <div class="dots">
  <span></span>
  <span></span>
</div>

  <div class="card">
    <div class="album-art" id="albumArt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>

    <div class="track-info">
      <div class="track-meta">
        <div class="track-title" id="trackTitle">not playing</div>
        <div class="track-artist" id="trackArtist">try searching a song</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="skipPrev()" title="Previous">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" onclick="togglePlay()">
        <svg id="playIcon" width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipNext()" title="Next">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="bottom-bar">
      <div class="vol-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.28)">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input class="search-input" id="searchInput" placeholder="search any song or artist..." oninput="onSearchInput()" />
      <div class="search-icons">
      </div>
    </div>
    <div class="results-area" id="resultsArea">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#fff">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <span id="emptyText">no songs found.</span>
      </div><div class="music-note">work in progress, don't expect much.</div>
    </div>
  </div>

</div>

<script>
  const sped = 5;
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  const SHADES = ["rgba(255,255,255,","rgba(235,235,235,","rgba(210,210,210,","rgba(185,185,185,","rgba(160,160,160,","rgba(220,220,220,"];
  function spawnParticle() {
    const w = canvas.width, h = canvas.height, edge = Math.random();
    let x, y, vx, vy;
    const speed = (0.35 + Math.random() * 0.55) * sped;
    if (edge < 0.45) {
      x = Math.random() * w * 0.65; y = h * (0.92 + Math.random() * 0.08);
      const a = -(Math.PI * 0.18 + Math.random() * Math.PI * 0.28);
      vx = speed * Math.cos(a) * (0.6 + Math.random() * 0.6); vy = speed * Math.sin(a) * (0.8 + Math.random() * 0.5);
    } else if (edge < 0.85) {
      x = w * (Math.random() * 0.05); y = h * (0.35 + Math.random() * 0.65);
      const a = -(Math.PI * 0.08 + Math.random() * Math.PI * 0.3);
      vx = speed * (0.7 + Math.random() * 0.5); vy = -speed * (0.3 + Math.random() * 0.5);
    } else {
      x = w * (Math.random() * 0.1); y = h * (0.85 + Math.random() * 0.15);
      const a = -(Math.PI * 0.22 + Math.random() * Math.PI * 0.22);
      vx = speed * Math.cos(a) * (0.6 + Math.random() * 0.7); vy = speed * Math.sin(a) * (0.7 + Math.random() * 0.5);
    }
    return { x, y, vx, vy, size: 0.8 + Math.random() * 2.2, shade: SHADES[Math.floor(Math.random() * SHADES.length)], alpha: 0.25 + Math.random() * 0.5, frame: 0, wobbleAmp: 0.2 + Math.random() * 0.9, wobbleFreq: 0.015 + Math.random() * 0.025, wobbleOffset: Math.random() * Math.PI * 2, curve: (Math.random() - 0.35) * 0.006 };
  }
  function stepParticle(p) { p.vx += p.curve; p.x += p.vx + Math.sin(p.frame * p.wobbleFreq + p.wobbleOffset) * p.wobbleAmp; p.y += p.vy; p.frame++; }
  function isOffscreen(p) { return p.x > canvas.width + 20 || p.y < -20 || p.x < -20 || p.y > canvas.height + 20; }
  function drawParticle(p) { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = p.shade + p.alpha.toFixed(3) + ")"; ctx.fill(); }
  function seedParticles(count) {
    const w = canvas.width, h = canvas.height;
    const cols = Math.ceil(Math.sqrt(count * (w / h))), rows = Math.ceil(count / cols);
    const cellW = w / cols, cellH = h / rows, result = [];
    for (let row = 0; row < rows && result.length < count; row++) {
      for (let col = 0; col < cols && result.length < count; col++) {
        const tx = col * cellW + Math.random() * cellW, ty = row * cellH + Math.random() * cellH;
        let best = null, bestDist = Infinity;
        for (let a = 0; a < 30; a++) {
          const p = spawnParticle(), pf = Math.floor(10 + Math.random() * 500);
          for (let f = 0; f < pf; f++) stepParticle(p);
          if (isOffscreen(p)) continue;
          const d = Math.hypot(p.x - tx, p.y - ty);
          if (d < bestDist) { bestDist = d; best = p; }
          if (d < Math.max(cellW, cellH) * 0.5) break;
        }
        result.push(best || spawnParticle());
      }
    }
    return result;
  }
  const particles = seedParticles(55);
  (function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) { if (isOffscreen(particles[i])) particles[i] = spawnParticle(); stepParticle(particles[i]); drawParticle(particles[i]); }
    requestAnimationFrame(animate);
  })();
</script>

<script>
  const LIBRARY = [
    { title: "armed and dangerous",   artist: "king von", file: "armed-and-dangerous.MP3" },
    { title: "bounce out with that",   artist: "ybn nahmir", file: "bounce-out-with-that.MP3" },
    { title: "bring me back to life",   artist: "evanescene", file: "bring-me-back-to-life.MP3" },
    { title: "dark thoughts",   artist: "lil tecca", file: "dark-thoughts.MP3" },
    { title: "ive been so sober",   artist: "overtonight", file: "ive-been-so-sober.MP3" },
    { title: "mirrors demo",   artist: "overtonight", file: "mirrors-demo.MP3" },
    { title: "oppa stoppa",   artist: "ybn nahmir, 21 savage", file: "oppa-stoppa.MP3" },
    { title: "empty out your pockets",   artist: "juice wrld", file: "run-them-pockets.MP3" },
    { title: "stalk ur socials",   artist: "s0rrow", file: "stalk-ur-socials.MP3" },
    { title: "theyll post it online",   artist: "overtonight", file: "theyll-post-it-online.MP3" },
    { title: "twenty four",   artist: "overtonight", file: "twenty-four.MP3" },
    { title: "nope your too late i already died",   artist: "wifiskeleton", file: "nytliad.MP3" },
    { title: "pass out",   artist: "fixupboy", file: "pass-out.MP3" },
    { title: "poem",   artist: "overtonight", file: "poem.MP3" },
  ];
  const MUSIC_DIR = "../music/";
  

  const audio = new Audio();
  audio.volume = 0.8;
  let currentIndex = -1;
  let filteredList = LIBRARY.map((_, i) => i).sort((a, b) => LIBRARY[a].title.localeCompare(LIBRARY[b].title));
  let currentList = [...LIBRARY];
  let isRepeat = false;
  let isShuffle = false;
  let isLiked = false;
  let queueOpen = false;

  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    document.getElementById("progressFill").style.width = (audio.currentTime / audio.duration * 100) + "%";
    document.getElementById("timeElapsed").textContent = fmt(audio.currentTime);
  });
  audio.addEventListener("loadedmetadata", () => {
    document.getElementById("timeDuration").textContent = fmt(audio.duration);
  });
  audio.addEventListener("play",  () => { setPlayIcon(true);  });
  audio.addEventListener("pause", () => { setPlayIcon(false); });
  audio.addEventListener("ended", () => {
    if (isRepeat) { audio.currentTime = 0; audio.play(); }
    else skipNext();
  });

  function fmt(s) {
    if (!s || isNaN(s)) return "0:00";
    return Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");
  }

  function playTrack(idx) {
    const t = currentList[idx];
    if (!t) return;
    currentIndex = idx;
    audio.src = MUSIC_DIR + t.file;
    audio.load();
    audio.play().catch(e => console.warn("audio play blocked:", e));
    document.getElementById("trackTitle").textContent = t.title;
    document.getElementById("trackArtist").textContent = t.artist || "";
    document.getElementById("progressFill").style.width = "0%";
    document.getElementById("timeElapsed").textContent = "0:00";
    document.getElementById("timeDuration").textContent = "0:00";
    updateHighlight();
  }

function togglePlay() {
  if (currentIndex === -1 && filteredList.length) { playTrack(filteredList[0]); return; }
  audio.paused ? audio.play().catch(() => {}) : audio.pause();
}

  function setPlayIcon(playing) {
    document.getElementById("playIcon").innerHTML = playing
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

function skipNext() {
  if (!filteredList.length) return;
  const pos = filteredList.indexOf(currentIndex);
  playTrack(filteredList[(pos + 1) % filteredList.length]);
}

function skipPrev() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (!filteredList.length) return;
  const pos = filteredList.indexOf(currentIndex);
  playTrack(filteredList[pos <= 0 ? filteredList.length - 1 : pos - 1]);
}

  function seekTo(e) {
    if (!audio.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  }

  function setVolume(v) { audio.volume = parseFloat(v); }

function onSearchInput() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!q) {
    filteredList = LIBRARY.map((_, i) => i);
  } else {
    filteredList = LIBRARY
      .map((t, i) => ({ t, i }))
      .filter(({ t }) =>
        t.title.toLowerCase().includes(q) ||
        (t.artist || "").toLowerCase().includes(q)
      )
      .map(({ i }) => i);
  }
  renderList();
}

  function toggleQueue() {
    queueOpen = !queueOpen;
    document.getElementById("queueBtn").classList.toggle("active", queueOpen);
    document.getElementById("searchInput").value = "";
    currentList = [...LIBRARY];
    renderList();
  }

function renderList() {
  const area = document.getElementById("resultsArea");
  area.querySelectorAll(".result-item").forEach(el => el.remove());

  if (!filteredList.length) {
    document.getElementById("emptyState").style.display = "flex";
    return;
  }
  document.getElementById("emptyState").style.display = "none";

  filteredList.forEach((libIdx, pos) => {
    const t = LIBRARY[libIdx];
    const div = document.createElement("div");
    div.className = "result-item" + (libIdx === currentIndex ? " playing" : "");
    div.dataset.libIdx = libIdx; // store so updateHighlight works
    div.innerHTML =
      `<div class="result-num">${pos + 1}</div>` +
      `<div class="result-meta">` +
        `<div class="result-title">${t.title}</div>` +
        (t.artist ? `<div class="result-artist">${t.artist}</div>` : "") +
      `</div>`;
    div.onclick = () => playTrack(libIdx);
    area.appendChild(div);
  });
}

function updateHighlight() {
  document.querySelectorAll(".result-item").forEach(el => {
    el.classList.toggle("playing", parseInt(el.dataset.libIdx) === currentIndex);
  });
}

  renderList();
</script>
