<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#171717">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin: 0; box-sizing: border-box; }

:root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #1f1f1f;
    --border-subtle: #171717;
    --text: #ffffff;
    --text-muted: #666666;
    --text-dim: #404040;
    --hover: #141414;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

.header {
    border-bottom: 1px solid var(--border-subtle);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
}

.header-title { font-size: 12.5px; font-weight: 500; color: var(--text); }
.header-sep { width: 1px; height: 14px; background: var(--border); }
.header-count { font-size: 12px; color: var(--text-dim); }

.search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 11px;
    width: 200px;
    transition: border-color 0.15s;
}

.search-wrap:focus-within { border-color: #2a2a2a; }

.search-wrap svg { color: var(--text-dim); flex-shrink: 0; }

.search-wrap input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    width: 100%;
}

.search-wrap input::placeholder { color: var(--text-dim); }

.content { padding: 20px; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 8px;
}

.game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, background 0.15s;
}

.game-card:hover {
    border-color: #2c2c2c;
    background: var(--surface2);
}

.game-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.game-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.game-thumb .fallback { width: 36px; height: 36px; opacity: 0.12; }

.game-info { padding: 9px 10px 10px; }

.game-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.empty {
    grid-column: 1 / -1;
    padding: 48px 0;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
}

#gameOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#gameIframe {
    width: 100%;
    height: 100%;
    border: none;
}

#loadingScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s;
    z-index: 101;
}
</style>
</head>

<body>

<div class="header">
    <span class="header-title">nebula games</span>
    <div class="header-sep"></div>
    <span class="header-count" id="gameCount"></span>

    <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="search games...">
    </div>
</div>

<div class="content">
    <div class="grid" id="grid"></div>
</div>

<div id="gameOverlay">
    <iframe id="gameIframe"></iframe>
    <div id="loadingScreen"></div>
</div>

<script>
const GAMES = [
    { name: "Geometry Dash", index: 1 },
    { name: "Five Nights at Epsteins", index: 2 },
    { name: "BitLife", index: 3 },
    { name: "Paper.io 2", index: 4 },
    { name: "ULTRAKILL", index: 5 },
    { name: "PolyTrack", index: 6 },
    { name: "Ragdoll Archers", index: 7 },
    { name: "Eaglercraft 1.12.2", index: 8 },
    { name: "GunSpin", index: 9 },
    { name: "Stickman Hook", index: 10 },
];

let searchQuery = "";

const grid = document.getElementById("grid");
const gameOverlay = document.getElementById("gameOverlay");
const loadingScreen = document.getElementById("loadingScreen");
const gameIframe = document.getElementById("gameIframe");

document.getElementById("searchInput").addEventListener("input", e => {
    searchQuery = e.target.value.toLowerCase();
    renderGrid();
});

function renderGrid() {
    const filtered = GAMES.filter(g =>
        g.name.toLowerCase().includes(searchQuery)
    );

    document.getElementById("gameCount").textContent =
        filtered.length + " game" + (filtered.length !== 1 ? "s" : "");

    if (!filtered.length) {
        grid.innerHTML = `<div class="empty">no games found.</div>`;
        return;
    }

    grid.innerHTML = "";

    filtered.forEach(game => {
        const a = document.createElement("a");
        a.className = "game-card";
        a.href = "#";

        a.addEventListener("click", e => {
            e.preventDefault();
            openGame(game);
        });

        const thumb = document.createElement("div");
        thumb.className = "game-thumb";

        const img = document.createElement("img");
        img.src = `../education/icons/${game.index}.png`;
        img.alt = game.name;

        img.onerror = () => {
            img.remove();
            thumb.innerHTML = `
                <svg class="fallback" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>`;
        };

        thumb.appendChild(img);

        const info = document.createElement("div");
        info.className = "game-info";
        info.innerHTML = `<div class="game-name">${game.name}</div>`;

        a.appendChild(thumb);
        a.appendChild(info);
        grid.appendChild(a);
    });
}

function openGame(game) {
    gameOverlay.style.display = "flex";
    loadingScreen.style.opacity = "1";

    loadingScreen.innerHTML = `
        <iframe src="./loading.html"
        style="width:100%;height:100%;border:none;"></iframe>
    `;

    gameIframe.style.display = "none";

    gameIframe.onload = () => {
        loadingScreen.style.opacity = "0";
        loadingScreen.addEventListener("transitionend", function removeLoading() {
            if (loadingScreen.parentNode) loadingScreen.parentNode.removeChild(loadingScreen);
            loadingScreen.removeEventListener("transitionend", removeLoading);
        });
    };

    gameIframe.src =
        `../education/${game.index}/index.html`;

    gameIframe.style.display = "block";
}

renderGrid();
</script>

</body>
</html>
