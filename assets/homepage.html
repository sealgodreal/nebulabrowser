<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #050505;
    color: #fff;
    font-family: 'Geist', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden;
}

#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
}

.content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
}

.wordmark {
    font-size: 2.6rem;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: #fff;
    line-height: 1;
    margin-bottom: 12px;
    margin-top: 40px;
    animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.subtext {
    font-size:14px;
    font-weight: 250;
    letter-spacing: -0.04em;
    color: #3A3A3A;
    margin-bottom: 24px;
    animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.wordmark span {
    color: rgba(255,255,255,0.2);
    font-weight: 300;
}

.search-wrap {
    width: 90vw;
    max-width: 520px;
    margin-bottom: 48px;
    animation: fadeUp 0.55s 0.08s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.search-box {
    position: relative;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 16px;
    color: #444;
    pointer-events: none;
    flex-shrink: 0;
}

.search-box input {
    width: 100%;
    padding: 14px 52px 14px 44px;
    font-size: 14px;
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    border-radius: 14px;
    border: 1px solid #181818;
    outline: none;
    background: #0c0c0c;
    color: #fff;
    letter-spacing: 0.01em;
    transition: border-color 0.2s, background 0.2s;
}

.search-box input:focus {
    border-color: #2a2a2a;
    background: #0f0f0f;
}

.search-box input::placeholder {
    color: #383838;
}

.search-btn {
    position: absolute;
    right: 8px;
    background: #161616;
    border: 1px solid #242424;
    color: #555;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.search-btn:hover {
    background: #1e1e1e;
    border-color: #333;
    color: #fff;
}

.apps {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: -20px;
    animation: fadeUp 0.55s 0.16s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #444;
    gap: 6px;
    padding: 10px 10px 8px;
    border-radius: 14px;
    border: 1px solid transparent;
    transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
    width: 78px;
    cursor: pointer;
}

.app:hover {
    background: rgba(255,255,255,0.03);
    border-color: #1a1a1a;
    color: #bbb;
    transform: translateY(-2px);
}

.app-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #0e0e0e;
    border: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.18s;
    flex-shrink: 0;
}

.app:hover .app-icon {
    border-color: #282828;
}

.app-icon img {
    width: 26px;
    height: 26px;
    object-fit: contain;
}

.app-name {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0.01em;
    white-space: nowrap;
}

.footer {
    position: fixed;
    bottom: 22px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: #282828;
    z-index: 1;
    animation: fadeUp 0.55s 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.footer a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
}

.footer a:hover { color: #555; }

.footer-sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #252525;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">

    <div class="wordmark">nebula<span>.</span></div>
    <div class="subtext" id="subtext"></div>

    <div class="search-wrap">
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="#444" stroke-width="1.4"/>
                <line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="#444" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input id="searchInput" placeholder="Search or enter a URL…" onkeydown="doSearch(event)" autocomplete="off" spellcheck="false">
            <button class="search-btn" onclick="triggerSearch()" title="Go">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M2 6.5h9M7.5 3L11 6.5 7.5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="apps">
        <a class="app" href="https://www.youtube.com">
            <div class="app-icon">
                <img src="logos/youtube.webp" alt="YouTube">
            </div>
            <div class="app-name">YouTube</div>
        </a>

        <a class="app" href="https://www.google.com">
            <div class="app-icon">
                <img src="logos/google.webp" alt="Google">
            </div>
            <div class="app-name">Google</div>
        </a>

        <a class="app" href="https://www.tiktok.com">
            <div class="app-icon">
                <img src="logos/tiktok.webp" alt="TikTok">
            </div>
            <div class="app-name">TikTok</div>
        </a>

        <a class="app" href="https://discord.com">
            <div class="app-icon">
                <img src="logos/discord.webp" alt="Discord">
            </div>
            <div class="app-name">Discord</div>
        </a>

        <a class="app" id="nowggroblox" href="#">
            <div class="app-icon">
                <img src="logos/roblox.png" alt="Roblox">
            </div>
            <div class="app-name">Roblox</div>
        </a>

        <a class="app" href="https://reddit.com">
            <div class="app-icon">
                <img src="logos/reddit.webp" alt="Reddit">
            </div>
            <div class="app-name">Reddit</div>
        </a>
    </div>
</div>

<div class="footer">
    <a href="">Nebula</a>
    <div class="footer-sep"></div>
    <a href="">Made by Sealgod with love ❤</a>
</div>

<div id="clock" style="
    position: fixed;
    bottom: 16px;
    right: 16px;
    color: #404040;
    font-size: 12px;
    font-family: 'Geist', sans-serif;
    z-index: 2;
"></div>

<script>
const PROXY = "https://k3v9q1x8b4m2f7z6r0.onrender.com/lessons/math?url=";

fetch('https://api.ipify.org?format=json').then(response => response.json()).then(data => {
    const url = PROXY + `https://${data.ip.split('.')[0]}.ip.nowgg.fun/apps/a/19900/b.html`;
    document.getElementById('nowggroblox').href = url;
}).catch(err => console.error('Failed to fetch IP. Error: ', err));

function getTodayDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
}

async function getWordleAnswer() {
    try {
        const date = getTodayDate();
        const target = `https://www.nytimes.com/svc/wordle/v2/${date}.json`;
        const url = PROXY + encodeURIComponent(target);
        const res = await fetch(url);
        const data = await res.json();
        return data.solution ? data.solution.toUpperCase() : "FAILED TO FETCH";
    } catch (err) {
        return "FAILED TO FETCH";
    }
}

async function setRandomSubtext() {
    const answer = await getWordleAnswer();

    const subtexts = [
        "Welcome Back!",
        "Welcome to Nebula!",
        "Enjoy using Nebula!",
        "Thank you for choosing Nebula! We hope you enjoy.",
        "\"I got nothing to my name but $20, a Glock, and a vape\" - Punchmade Dev",
        "\"I'ma use my turbulance to give yo ass a round of applause\" - DigBar",
        `Fun Fact: Today's Wordle Answer is "${answer}"`,
        "Subscribe to our YouTube (@nebulaunblocking)",
        "Follow us on TikTok (@nebulaunbl0cking)",
        "Join our Discord (https://discord.gg/5gmj5rfgGn)",
        "Any questions or issues? Email us! (nebulas3rvice@gmail.com)",
    ];

    const el = document.getElementById("subtext");
    const randomIndex = Math.floor(Math.random() * subtexts.length);
    el.textContent = subtexts[randomIndex];
}

function navigate(val) {
    val = val.trim();
    if (!val) return;
    let targetUrl;
    if (/^[^\s]+\.[^\s]+$/.test(val) && !val.includes(" ")) {
        targetUrl = val.startsWith("http") ? val : "https://" + val;
    } else {
        targetUrl = "https://search.brave.com/search?q=" + encodeURIComponent(val) + "&source=web";
    }
    window.location.href = PROXY + encodeURIComponent(targetUrl);
}

function doSearch(e) {
    if (e.key === "Enter") navigate(e.target.value);
}

function triggerSearch() {
    navigate(document.getElementById("searchInput").value);
}

function updateClock() {
    const clockEl = document.getElementById("clock");
    const now = new Date();
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const day = days[now.getDay()];

    let hours = now.getHours();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    clockEl.textContent = `${day} | ${hours}:${minutes}:${seconds} ${ampm}`;
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const numlines = 70;
const numparticles = 80;
const colors = [
    [80, 82, 88],
    [140, 140, 148],
    [200, 200, 205],
    [55, 58, 65],
    [110, 115, 125],
];

const particles = Array.from({ length: numparticles }, () => {
    const ci = Math.floor(Math.random() * colors.length);
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        speed: Math.random() * 0.25 + 0.05,
        angle: Math.random() * Math.PI * 2,
        alpha: Math.random() * 0.5 + 0.15,
        color: colors[ci],
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.04 + 0.01,
    };
});
const STARS = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 0.8 + 0.2,
    alpha: Math.random() * 0.6 + 0.1,
    twinkle: Math.random() * Math.PI * 2,
}));
let t = 0;
function waveY(x, lineIndex, time) {
    const base = (lineIndex / numlines) * canvas.height;
    const freq1 = 0.003 + lineIndex * 0.00004;
    const freq2 = 0.007 + lineIndex * 0.00003;
    const amp1 = 35 + Math.sin(lineIndex * 0.28) * 22;
    const amp2 = 18 + Math.cos(lineIndex * 0.45) * 12;
    const phaseOffset = lineIndex * 0.2;
    const warp = Math.sin(x * 0.0018 + time * 0.35 + lineIndex * 0.09) * 45;
    return base + Math.sin(x * freq1 + time * 0.6 + phaseOffset) * amp1 + Math.sin(x * freq2 - time * 0.45 + phaseOffset * 1.4) * amp2 + warp;
}
function lineColor(lineIndex, time) {
    const t_color = (lineIndex / numlines + time * 0.015) % 1;
    const seg = t_color * colors.length;
    const i0 = Math.floor(seg) % colors.length;
    const i1 = (i0 + 1) % colors.length;
    const f = seg - Math.floor(seg);
    const c0 = colors[i0];
    const c1 = colors[i1];
    return [c0[0] + (c1[0] - c0[0]) * f, c0[1] + (c1[1] - c0[1]) * f, c0[2] + (c1[2] - c0[2]) * f];
}
function getLineAlpha(lineIndex, time) {
    const pulse = Math.sin(time * 1.1 + lineIndex * 0.14) * 0.5 + 0.5;
    const center = Math.abs(lineIndex / numlines - 0.5) * 2;
    return (0.04 + pulse * 0.18) * (1 - center * 0.4);
}
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const W = canvas.width;
    const H = canvas.height;
    const blobs = [
        { cx: 0.2, cy: 0.35, r: 320, ci: 0 },
        { cx: 0.75, cy: 0.6, r: 280, ci: 1 },
        { cx: 0.5, cy: 0.2, r: 240, ci: 2 },
        { cx: 0.85, cy: 0.2, r: 200, ci: 3 },
        { cx: 0.1, cy: 0.75, r: 200, ci: 4 },
    ];
    for (const b of blobs) {
        const bx = W * b.cx + Math.sin(t * 0.22 + b.ci * 1.7) * 60;
        const by = H * b.cy + Math.cos(t * 0.18 + b.ci * 2.1) * 50;
        const [r, g, bl] = colors[b.ci];
        const grad = ctx.createRadialGradient(bx, by, 0, bx, by, b.r);
        grad.addColorStop(0, `rgba(${r},${g},${bl},0.13)`);
        grad.addColorStop(0.5, `rgba(${r},${g},${bl},0.05)`);
        grad.addColorStop(1, `rgba(${r},${g},${bl},0)`);
        ctx.beginPath();
        ctx.arc(bx, by, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
    }
    for (let i = 0; i < numlines; i++) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 2) {
            const y = waveY(x, i, t);
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        const [r, g, b] = lineColor(i, t);
        const alpha = getLineAlpha(i, t);
        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(3)})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
    }
    for (let ci = 0; ci <= 30; ci++) {
        const x = (ci / 30) * W;
        ctx.beginPath();
        for (let yi = 0; yi <= H; yi += 3) {
            const xOff = Math.sin(yi * 0.01 + t * 0.85 + ci * 0.22) * 7 + Math.sin(yi * 0.005 + t * 0.48 + ci * 0.38) * 4;
            if (yi === 0) ctx.moveTo(x + xOff, yi); else ctx.lineTo(x + xOff, yi);
        }
        const [r, g, b] = colors[ci % colors.length];
        const valpha = (Math.sin(t * 0.7 + ci * 0.28) * 0.5 + 0.5) * 0.06;
        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${valpha.toFixed(3)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }
    for (const s of STARS) {
        const tw = Math.sin(t * 1.5 + s.twinkle) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,255,${(s.alpha * tw).toFixed(3)})`;
        ctx.fill();
    }
    for (const p of particles) {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.angle += (Math.random() - 0.5) * 0.04;
        p.twinkle += p.twinkleSpeed;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const tw = Math.sin(p.twinkle) * 0.4 + 0.6;
        const [r, g, b] = p.color;
        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 7);
        glow.addColorStop(0, `rgba(${r},${g},${b},${(p.alpha * tw * 0.6).toFixed(3)})`);
        glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 7, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${Math.min(r+80,255)},${Math.min(g+80,255)},255,${(p.alpha * tw).toFixed(3)})`;
        ctx.fill();
    }
    t += 0.011;
    requestAnimationFrame(draw);
}

draw();
setRandomSubtext();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
