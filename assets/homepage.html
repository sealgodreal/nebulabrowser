<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000000;
    color: #ffffff;
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    gap: 0;
}

.wordmark {
    font-size: 5rem;
    font-weight: 600;
    letter-spacing: -0.04em;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 6px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.wordmark-underline {
    width: 60px;
    height: 2px;
    background: #ffffff;
    margin: 0 auto 36px;
    border-radius: 2px;
    animation: fadeUp 0.6s 0.05s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.search-container {
    width: 90%;
    max-width: 480px;
    margin-bottom: 40px;
    position: relative;
    animation: fadeUp 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #555;
    font-size: 14px;
    pointer-events: none;
}

.search-container input {
    width: 100%;
    padding: 13px 20px 13px 42px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    border-radius: 999px;
    border: 1px solid #222;
    outline: none;
    background: #111;
    color: #ffffff;
    transition: border-color 0.2s;
    letter-spacing: 0.01em;
}

.search-container input:focus {
    border-color: #444;
}

.search-container input::placeholder {
    color: #555;
}

.search-engine {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}

.search-engine:hover { background: #222; color: #fff; }

.app-links {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #aaa;
    gap: 8px;
    padding: 14px 12px 12px;
    border-radius: 16px;
    border: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
    width: 80px;
}

.app:hover {
    background: #111;
    border-color: #222;
    color: #fff;
    transform: translateY(-2px);
}

.app-icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #111;
    border: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.2s;
}

.app:hover .app-icon { border-color: #333; }

.app-icon img {
    width: 26px;
    height: 26px;
    object-fit: contain;
    filter: grayscale(20%);
}

.app-name {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.01em;
}

.app-add .app-icon {
    background: transparent;
    border-style: dashed;
    border-color: #2a2a2a;
    color: #444;
    font-size: 20px;
    font-weight: 300;
}

.app-add:hover .app-icon {
    border-color: #444;
    color: #888;
}

.footer {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 11.5px;
    color: #3a3a3a;
    animation: fadeUp 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.footer a {
    color: #3a3a3a;
    text-decoration: none;
    transition: color 0.15s;
}

.footer a:hover { color: #888; }

.footer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1e1e1e;
    align-self: center;
}

.footer-online {
    display: flex;
    align-items: center;
    gap: 6px;
}

.online-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e74c3c;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="wordmark">nebula</div>
<div class="wordmark-underline"></div>

<div class="search-container">
    <span class="search-icon">&#128269;</span>
    <input id="searchInput" placeholder="Search or Enter a URL" onkeydown="doSearch(event)">
</div>

<div class="app-links">
    <a class="app" href="https://www.youtube.com">
        <div class="app-icon">
            <img src="logos/youtube.webp" alt="YouTube" onerror="this.parentElement.innerHTML='&#9654;'">
        </div>
        <div class="app-name">YouTube</div>
    </a>

    <a class="app" href="https://www.google.com">
        <div class="app-icon">
            <img src="logos/google.webp" alt="Google" onerror="this.parentElement.innerHTML='&#127760;'">
        </div>
        <div class="app-name">Google</div>
    </a>

    <a class="app" href="https://www.tiktok.com">
        <div class="app-icon">
            <img src="logos/tiktok.webp" alt="TikTok" onerror="this.parentElement.innerHTML='&#127911;'">
        </div>
        <div class="app-name">TikTok</div>
    </a>

    <a class="app" href="https://discord.com">
        <div class="app-icon">
            <img src="logos/discord.webp" alt="Discord" onerror="this.parentElement.innerHTML='&#128172;'">
        </div>
        <div class="app-name">Discord</div>
    </a>
</div>

<div class="footer">
    <a href="">Nebula : Made by Sealgod with love ❤</a>
</div>

<script>
function doSearch(e) {
    if (e.key !== "Enter") return;
    const val = e.target.value.trim();
    if (!val) return;
    const url = val.startsWith("http") || /^[^\s]+\.[^\s]+$/.test(val)
        ? (val.startsWith("http") ? val : "https://" + val)
        : "https://duckduckgo.com/?q=" + encodeURIComponent(val);
    window.location.href = url;
}
</script>

</body>
</html>
