<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #050505;
    color: #fff;
    font-family: 'Geist', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden;
}

#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
}

.content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
}

.wordmark {
    font-size: 2.6rem;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: #fff;
    line-height: 1;
    margin-bottom: 12px;
    margin-top: 40px;
    animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.subtext {
    font-size:14px;
    font-weight: 250;
    letter-spacing: -0.04em;
    color: #3A3A3A;
    margin-bottom: 24px;
    animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.wordmark span {
    color: rgba(255,255,255,0.2);
    font-weight: 300;
}

.search-wrap {
    width: 90vw;
    max-width: 520px;
    margin-bottom: 48px;
    animation: fadeUp 0.55s 0.08s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.search-box {
    position: relative;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 16px;
    color: #444;
    pointer-events: none;
    flex-shrink: 0;
}

.search-box input {
    width: 100%;
    padding: 14px 52px 14px 44px;
    font-size: 14px;
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    border-radius: 14px;
    border: 1px solid #181818;
    outline: none;
    background: #0c0c0c;
    color: #fff;
    letter-spacing: 0.01em;
    transition: border-color 0.2s, background 0.2s;
}

.search-box input:focus {
    border-color: #2a2a2a;
    background: #0f0f0f;
}

.search-box input::placeholder {
    color: #383838;
}

.search-btn {
    position: absolute;
    right: 8px;
    background: #161616;
    border: 1px solid #242424;
    color: #555;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.search-btn:hover {
    background: #1e1e1e;
    border-color: #333;
    color: #fff;
}

.apps {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: -20px;
    animation: fadeUp 0.55s 0.16s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #444;
    gap: 6px;
    padding: 10px 10px 8px;
    border-radius: 14px;
    border: 1px solid transparent;
    transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
    width: 78px;
    cursor: pointer;
}

.app:hover {
    background: rgba(255,255,255,0.03);
    border-color: #1a1a1a;
    color: #bbb;
    transform: translateY(-2px);
}

.app-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #0e0e0e;
    border: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.18s;
    flex-shrink: 0;
}

.app:hover .app-icon {
    border-color: #282828;
}

.app-icon img {
    width: 26px;
    height: 26px;
    object-fit: contain;
}

.app-name {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0.01em;
    white-space: nowrap;
}

.footer {
    position: fixed;
    bottom: 22px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: #282828;
    z-index: 1;
    animation: fadeUp 0.55s 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.footer a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
}

.footer a:hover { color: #555; }

.footer-sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #252525;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">

    <div class="wordmark">nebula<span>.</span></div>
    <div class="subtext" id="subtext"></div>

    <div class="search-wrap">
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="#444" stroke-width="1.4"/>
                <line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="#444" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input id="searchInput" placeholder="Search or enter a URL…" onkeydown="doSearch(event)" autocomplete="off" spellcheck="false">
            <button class="search-btn" onclick="triggerSearch()" title="Go">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M2 6.5h9M7.5 3L11 6.5 7.5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="apps">
        <a class="app" href="https://www.youtube.com">
            <div class="app-icon">
                <img src="logos/youtube.webp" alt="YouTube">
            </div>
            <div class="app-name">YouTube</div>
        </a>

        <a class="app" href="https://www.google.com">
            <div class="app-icon">
                <img src="logos/google.webp" alt="Google">
            </div>
            <div class="app-name">Google</div>
        </a>

        <a class="app" href="https://www.tiktok.com">
            <div class="app-icon">
                <img src="logos/tiktok.webp" alt="TikTok">
            </div>
            <div class="app-name">TikTok</div>
        </a>

        <a class="app" href="https://discord.com">
            <div class="app-icon">
                <img src="logos/discord.webp" alt="Discord">
            </div>
            <div class="app-name">Discord</div>
        </a>

        <a class="app" href="https://roblox.com">
            <div class="app-icon">
                <img src="logos/roblox.png" alt="Roblox">
            </div>
            <div class="app-name">Roblox</div>
        </a>

        <a class="app" href="https://reddit.com">
            <div class="app-icon">
                <img src="logos/reddit.webp" alt="Reddit">
            </div>
            <div class="app-name">Reddit</div>
        </a>
    </div>
</div>

<div class="footer">
    <a href="">Nebula</a>
    <div class="footer-sep"></div>
    <a href="">Made by Sealgod with love ❤</a>
</div>

<div id="clock" style="
    position: fixed;
    bottom: 16px;
    right: 16px;
    color: #404040;
    font-size: 12px;
    font-family: 'Geist', sans-serif;
    z-index: 2;
"></div>

<script>
const PROXY = "https://nebulaproxy-j7xn.onrender.com/nebula/proxy?url=";

function getTodayDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
}

async function getWordleAnswer() {
    try {
        const date = getTodayDate();
        const target = `https://www.nytimes.com/svc/wordle/v2/${date}.json`;
        const url = PROXY + encodeURIComponent(target);
        const res = await fetch(url);
        const data = await res.json();
        return data.solution ? data.solution.toUpperCase() : "FAILED TO FETCH";
    } catch (err) {
        return "FAILED TO FETCH";
    }
}

async function setRandomSubtext() {
    const answer = await getWordleAnswer();

    const subtexts = [
        "Welcome Back!",
        "Thank you for choosing Nebula! We hope you enjoy.",
        `Fun Fact: Today's Wordle Answer is "${answer}"`,
        "Subscribe to our YouTube (@nebulaunblocking)",
        "Follow us on TikTok (@nebulaunbl0cking)",
        "Any questions or issues? Email us! (nebulas3rvice@gmail.com)",
    ];

    const el = document.getElementById("subtext");
    const randomIndex = Math.floor(Math.random() * subtexts.length);
    el.textContent = subtexts[randomIndex];
}

function navigate(val) {
    val = val.trim();
    if (!val) return;
    let targetUrl;
    if (/^[^\s]+\.[^\s]+$/.test(val) && !val.includes(" ")) {
        targetUrl = val.startsWith("http") ? val : "https://" + val;
    } else {
        targetUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(val);
    }
    window.location.href = PROXY + encodeURIComponent(targetUrl);
}

function doSearch(e) {
    if (e.key === "Enter") navigate(e.target.value);
}

function triggerSearch() {
    navigate(document.getElementById("searchInput").value);
}

function updateClock() {
    const clockEl = document.getElementById("clock");
    const now = new Date();
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const day = days[now.getDay()];

    let hours = now.getHours();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    clockEl.textContent = `${day} | ${hours}:${minutes}:${seconds} ${ampm}`;
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
                ctx.strokeStyle = `rgba(255,255,255,${(1 - dist/110) * 0.06})`;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    particles.forEach(p => {
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });
    requestAnimationFrame(draw);
}
draw();
setRandomSubtext();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
