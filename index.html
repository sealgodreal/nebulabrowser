<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nebula Browser</title>

<style>
* {
    margin: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: #202124;
    color: #e8eaed;
}

.topbar {
    background: #2b2c2f;
    border-bottom: 1px solid #3c4043;
}

.tabs {
    display: flex;
    padding: 6px 6px 0;
    gap: 4px;
}

.tab {
    background: #3c4043;
    padding: 6px 12px;
    border-radius: 8px 8px 0 0;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}

.tab.active {
    background: #202124;
    color: white;
}

.close {
    opacity: 0.6;
}

.close:hover {
    opacity: 1;
}

.new-tab {
    padding: 6px 10px;
    cursor: pointer;
    opacity: 0.7;
}

.new-tab:hover {
    opacity: 1;
}

.navbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
    border-top: 1px solid #3c4043;
}

.nav-btn {
    background: none;
    border: none;
    color: #e8eaed;
    font-size: 14px;
    padding: 6px;
    cursor: pointer;
}

.nav-btn:hover {
    background: #3c4043;
    border-radius: 6px;
}

.omnibox {
    flex: 1;
    display: flex;
    background: #3c4043;
    border-radius: 20px;
    padding: 4px 10px;
}

.omnibox input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
    font-size: 14px;
}

.page {
    height: calc(100vh - 90px);
    position: relative;
}

.webview {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}
.settings-item:hover {
    background: #50535a;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="tabs" id="tabs"></div>

    <div class="navbar">
        <button class="nav-btn" onclick="goBack()">←</button>
        <button class="nav-btn" onclick="goForward()">→</button>
        <button class="nav-btn" onclick="doReload()">⟳</button>

        <div class="omnibox">
            <input id="url" placeholder="Search or type URL" onkeydown="navigate(event)">
        </div>
        <div class="settings-container" style="position: relative;">
    <button class="nav-btn" id="settingsBtn">⚙</button>
    <div id="settingsMenu" style="display:none; position:absolute; top:36px; right:0; background:#3c4043; border-radius:6px; padding:4px 0; min-width:120px; box-shadow:0 2px 6px rgba(0,0,0,0.5); z-index:100;">
        <div class="settings-item" style="padding:6px 12px; cursor:pointer;">about:blank cloak</div>
    </div>
</div>
    </div>
</div>

<div class="page" id="page"></div>

<script>
const PROXY = "https://nebulaproxy-j7xn.onrender.com/nebula/proxy?url=";

function toProxy(url) {
    if (!url || url === "about:blank") return url;
    if (url.startsWith(PROXY)) return url;
    return PROXY + encodeURIComponent(url);
}

let tabs = [];
let activeTab = null;
let tabId = 0;

const tabsContainer = document.getElementById("tabs");
const page = document.getElementById("page");
const urlInput = document.getElementById("url");

const newTabBtn = document.createElement("div");
newTabBtn.className = "new-tab";
newTabBtn.textContent = "+";
newTabBtn.onclick = () => createTab();
tabsContainer.appendChild(newTabBtn);

const HOMEPAGE = "https://sealgodreal.github.io/nebulabrowser/assets/homepage.html";

function createTab(url = "") {
    if (!url) {
        url = HOMEPAGE;
    }

    const id = tabId++;

    const tab = document.createElement("div");
    tab.className = "tab";
    tab.innerHTML = `New Tab <span class="close">✕</span>`;

    const iframe = document.createElement("iframe");
    iframe.className = "webview";

    page.appendChild(iframe);
    tabsContainer.insertBefore(tab, newTabBtn);

    const tabObj = { id, tab, iframe, url };

    tabs.push(tabObj);

    tab.onclick = () => switchTab(id);
    tab.querySelector(".close").onclick = (e) => {
        e.stopPropagation();
        closeTab(id);
    };

    iframe.onload = () => {
        try {
            urlInput.value = iframe.contentWindow.location.href;
        } catch {}
    };

    switchTab(id);

    loadURL(id, url);
}

function switchTab(id) {
    tabs.forEach(t => {
        t.tab.classList.remove("active");
        t.iframe.style.display = "none";
    });

    const t = tabs.find(t => t.id === id);
    if (!t) return;

    t.tab.classList.add("active");
    t.iframe.style.display = "block";

    activeTab = t;
    urlInput.value = t.url || "";
}

function closeTab(id) {
    const index = tabs.findIndex(t => t.id === id);
    if (index === -1) return;

    const t = tabs[index];
    t.tab.remove();
    t.iframe.remove();

    tabs.splice(index, 1);

    if (tabs.length) {
        switchTab(tabs[Math.max(0, index - 1)].id);
    }
}

function formatURL(input) {
    input = input.trim();
    if (!input) return "";

    if (input.startsWith("http")) return input;

    if (/^[^\s]+\.[^\s]+$/.test(input)) {
        return "https://" + input;
    }

    return "https://duckduckgo.com/?q=" + encodeURIComponent(input) + "&ia=web";
}

function loadURL(tabId, raw) {
    const t = tabs.find(t => t.id === tabId);
    if (!t) return;

    const url = formatURL(raw);

    t.url = url;
    t.iframe.src = toProxy(url);

    if (activeTab?.id === tabId) {
        urlInput.value = url;
    }
}

function navigate(e) {
    if (e.key === "Enter" && activeTab) {
        loadURL(activeTab.id, e.target.value);
    }
}

function goBack() {
    activeTab?.iframe.contentWindow.history.back();
}

function goForward() {
    activeTab?.iframe.contentWindow.history.forward();
}

function doReload() {
    activeTab?.iframe.contentWindow.location.reload();
}

createTab();

const settingsBtn = document.getElementById("settingsBtn");
const settingsMenu = document.getElementById("settingsMenu");
const settingsItem = settingsMenu.querySelector(".settings-item");

settingsBtn.onclick = (e) => {
    e.stopPropagation();
    settingsMenu.style.display = settingsMenu.style.display === "block" ? "none" : "block";
};

document.addEventListener("click", () => {
    settingsMenu.style.display = "none";
});

settingsItem.onclick = () => {
    const newTab = window.open("about:blank", "_blank");
    if (newTab) {
        newTab.document.write(`
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>about:blank</title>
                <style>
                    body, html { margin:0; padding:0; height:100%; }
                    iframe { width:100%; height:100%; border:none; }
                </style>
            </head>
            <body>
                <iframe src="https://sealgodreal.github.io/nebulabrowser/" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </body>
            </html>
        `);
        newTab.document.close();
    }

    settingsMenu.style.display = "none";

        const sites = [
        "https://www.clever.com/",
        "https://classroom.google.com/",
        "https://login.i-ready.com/",
        "https://www.blooket.com/",
        "https://drive.google.com/",
        "https://kahoot.it"
    ];

    setTimeout(() => {
        window.location.href = sites[Math.floor(Math.random() * sites.length)];
    }, 500);
};
</script>

</body>
</html>
