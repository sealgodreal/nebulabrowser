<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nebula Browser</title>

<style>
* {
    margin: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: #202124;
    color: #e8eaed;
}

.topbar {
    background: #2b2c2f;
    border-bottom: 1px solid #3c4043;
}

.tabs {
    display: flex;
    padding: 6px 6px 0;
    gap: 4px;
}

.tab {
    background: #3c4043;
    padding: 6px 12px;
    border-radius: 8px 8px 0 0;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}

.tab.active {
    background: #202124;
    color: white;
}

.close {
    opacity: 0.6;
}

.close:hover {
    opacity: 1;
}

.new-tab {
    padding: 6px 10px;
    cursor: pointer;
    opacity: 0.7;
}

.new-tab:hover {
    opacity: 1;
}

.navbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
    border-top: 1px solid #3c4043;
}

.nav-btn {
    background: none;
    border: none;
    color: #e8eaed;
    font-size: 14px;
    padding: 6px;
    cursor: pointer;
}

.nav-btn:hover {
    background: #3c4043;
    border-radius: 6px;
}

.omnibox {
    flex: 1;
    display: flex;
    background: #3c4043;
    border-radius: 20px;
    padding: 4px 10px;
}

.omnibox input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
    font-size: 14px;
}

.subtabs {
    display: flex;
    gap: 6px;
    padding: 6px;
    border-top: 1px solid #3c4043;
    background: #2b2c2f;
}

.subtab {
    background: #3c4043;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}

.subtab:hover {
    background: #50535a;
}

.page {
    height: calc(100vh - 120px);
    position: relative;
}

.webview {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}

.overlay {
    position: absolute;
    top: 120px;
    left: 0;
    width: 100%;
    height: calc(100% - 120px);
    background: #202124;
    z-index: 999;
    display: none;
    flex-direction: column;
}

.overlay-header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #2b2c2f;
    border-bottom: 1px solid #3c4043;
}

.overlay-content {
    padding: 10px;
    overflow-y: auto;
}

.menu-btn {
    display: block;
    width: 100%;
    background: #3c4043;
    border: none;
    color: white;
    padding: 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
}

.menu-btn:hover {
    background: #50535a;
}

.settings-item:hover {
    background: #50535a;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="tabs" id="tabs"></div>

    <div class="navbar">
        <button class="nav-btn" onclick="goBack()">←</button>
        <button class="nav-btn" onclick="goForward()">→</button>
        <button class="nav-btn" onclick="doReload()">⟳</button>

        <div class="omnibox">
            <input id="url" placeholder="Search or type URL" onkeydown="navigate(event)">
        </div>

        <div class="settings-container" style="position: relative;">
            <button class="nav-btn" id="settingsBtn">⚙</button>
            <div id="settingsMenu" style="display:none; position:absolute; top:36px; right:0; background:#3c4043; border-radius:6px; padding:4px 0; min-width:120px;">
                <div class="settings-item" style="padding:6px 12px; cursor:pointer;">about:blank cloak</div>
            </div>
        </div>
    </div>

    <div class="subtabs">
        <div class="subtab" onclick="openMenu('games')">Games</div>
        <div class="subtab" onclick="openMenu('proxies')">Other Proxies</div>
        <div class="subtab" onclick="openMenu('socials')">Socials</div>
    </div>
</div>

<div class="page" id="page"></div>

<div id="overlayMenu" class="overlay">
    <div class="overlay-header">
        <span id="overlayTitle">Menu</span>
        <button onclick="closeMenu()">✕</button>
    </div>
    <div id="overlayContent" class="overlay-content"></div> 
</div>

<script>
const PROXY = "https://nebulaproxy-j7xn.onrender.com/nebula/proxy?url=";

function toProxy(url) {
    if (!url || url === "about:blank") return url;
    if (url.startsWith(PROXY)) return url;
    return PROXY + encodeURIComponent(url);
}

let tabs = [];
let activeTab = null;
let tabId = 0;

const tabsContainer = document.getElementById("tabs");
const page = document.getElementById("page");
const urlInput = document.getElementById("url");

const newTabBtn = document.createElement("div");
newTabBtn.className = "new-tab";
newTabBtn.textContent = "+";
newTabBtn.onclick = () => createTab();
tabsContainer.appendChild(newTabBtn);

const HOMEPAGE = "https://sealgodreal.github.io/nebulabrowser/assets/homepage.html";

function createTab(url = "") {
    if (!url) url = HOMEPAGE;

    const id = tabId++;

    const tab = document.createElement("div");
    tab.className = "tab";
    tab.innerHTML = `New Tab <span class="close">✕</span>`;

    const iframe = document.createElement("iframe");
    iframe.className = "webview";

    page.appendChild(iframe);
    tabsContainer.insertBefore(tab, newTabBtn);

    const tabObj = { id, tab, iframe, url };
    tabs.push(tabObj);

    tab.onclick = () => switchTab(id);
    tab.querySelector(".close").onclick = (e) => {
        e.stopPropagation();
        closeTab(id);
    };

    switchTab(id);
    loadURL(id, url);
}

function switchTab(id) {
    tabs.forEach(t => {
        t.tab.classList.remove("active");
        t.iframe.style.display = "none";
    });

    const t = tabs.find(t => t.id === id);
    if (!t) return;

    t.tab.classList.add("active");
    t.iframe.style.display = "block";

    activeTab = t;
    urlInput.value = t.url || "";
}

function closeTab(id) {
    const index = tabs.findIndex(t => t.id === id);
    if (index === -1) return;

    tabs[index].tab.remove();
    tabs[index].iframe.remove();
    tabs.splice(index, 1);

    if (tabs.length) {
        switchTab(tabs[Math.max(0, index - 1)].id);
    }
}

function formatURL(input) {
    if (input.startsWith("http")) return input;
    if (/^[^\s]+\.[^\s]+$/.test(input)) return "https://" + input;
    return "https://duckduckgo.com/?q=" + encodeURIComponent(input);
}

function loadURL(tabId, raw) {
    const t = tabs.find(t => t.id === tabId);
    if (!t) return;

    const url = formatURL(raw);
    t.url = url;
    t.iframe.src = toProxy(url);

    if (activeTab?.id === tabId) {
        urlInput.value = url;
    }
}

function navigate(e) {
    if (e.key === "Enter" && activeTab) {
        loadURL(activeTab.id, e.target.value);
    }
}

function goBack() { activeTab?.iframe.contentWindow.history.back(); }
function goForward() { activeTab?.iframe.contentWindow.history.forward(); }
function doReload() { activeTab?.iframe.contentWindow.location.reload(); }

const overlay = document.getElementById("overlayMenu");
const overlayContent = document.getElementById("overlayContent");
const overlayTitle = document.getElementById("overlayTitle");

function openMenu(type) {
    overlay.style.display = "flex";

    if (type === "games") {
        overlayTitle.textContent = "Games";

        overlayContent.innerHTML = `
            <label style="display:block; margin-bottom:10px;">
                <input type="checkbox" id="proxyToggle"> Proxy Link
            </label>
            <div id="gamesList">Loading...</div>
        `;

        loadList(
            "https://raw.githubusercontent.com/sealgodreal/nebulabrowser/main/assets/gameslist.txt",
            (link) => {
                const useProxy = document.getElementById("proxyToggle")?.checked;
                window.open(useProxy ? toProxy(link) : link);
                closeMenu();
            },
            "gamesList"
        );
    }

    if (type === "socials") {
        overlayTitle.textContent = "Socials";
        loadList(
            "https://raw.githubusercontent.com/sealgodreal/nebulabrowser/main/assets/socialslist.txt",
            (link) => {
                loadURL(activeTab.id, link);
                closeMenu();
            }
        );
    }

    if (type === "proxies") {
        overlayTitle.textContent = "Other Proxies";
        loadList(
            "https://raw.githubusercontent.com/sealgodreal/nebulabrowser/main/assets/proxylist.txt",
            (link) => {
                window.open(link);
                closeMenu();
            }
        );
    }
}

function closeMenu() {
    overlay.style.display = "none";
}

function loadList(url, onClick, containerId = null) {
    fetch(url)
        .then(res => res.text())
        .then(text => {
            const container = containerId 
                ? document.getElementById(containerId) 
                : overlayContent;

            container.innerHTML = "";

            text.split("\n").forEach(link => {
                link = link.trim();
                if (!link) return;

                const btn = document.createElement("button");
                btn.className = "menu-btn";
                btn.textContent = link;
                btn.onclick = () => onClick(link);

                container.appendChild(btn);
            });
        })
        .catch(() => {
            overlayContent.innerHTML = "Failed to load " + url;
        });
}

createTab();
</script>

</body>
</html>
